<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0B3D66" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Portugal Familievakantie 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main">
        <div
          id="tab-reis"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="tab-btn-reis"
        >
          <div id="reis" class="reis" aria-live="polite">
            <p class="loading">Reis laden…</p>
          </div>
        </div>

        <div
          id="tab-route"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="tab-btn-route"
          hidden
        >
          <section class="tab-placeholder" aria-live="polite">
            <h1 class="tab-placeholder-title">Route</h1>
            <p class="tab-placeholder-text">
              Hier komt een eenvoudig overzicht van de route.
            </p>
          </section>
        </div>

        <div
          id="tab-todo"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="tab-btn-todo"
          hidden
        >
          <div id="things-to-do" class="things-to-do">
            <p class="loading">Tips laden…</p>
          </div>
        </div>

        <div
          id="tab-planning"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="tab-btn-planning"
          hidden
        >
          <section id="destinations" class="destinations" aria-live="polite">
            <p class="loading">Bestemmingen laden…</p>
          </section>
        </div>
      </main>

      <nav class="tab-bar" role="tablist" aria-label="Hoofdnavigatie">
        <button
          type="button"
          class="tab-btn is-active"
          role="tab"
          id="tab-btn-reis"
          aria-controls="tab-reis"
          aria-selected="true"
          tabindex="0"
          data-tab="reis"
        >
          <span class="tab-btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path
                d="M8.5 7V5.5A2.5 2.5 0 0 1 11 3h2a2.5 2.5 0 0 1 2.5 2.5V7"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
              />
              <rect
                x="4.5"
                y="7"
                width="15"
                height="12.5"
                rx="2.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
              />
              <path
                d="M4.5 12h15"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
              />
            </svg>
          </span>
          <span class="tab-btn-label">Reis</span>
        </button>

        <button
          type="button"
          class="tab-btn"
          role="tab"
          id="tab-btn-route"
          aria-controls="tab-route"
          aria-selected="false"
          tabindex="-1"
          data-tab="route"
        >
          <span class="tab-btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path
                d="M8 5.5c0 1.5-1.2 2.5-2.5 3.5S3 11.2 3 13a3 3 0 0 0 6 0c0-1.8-.7-2.8-2.5-4S8 7 8 5.5Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linejoin="round"
              />
              <circle cx="6" cy="13" r="1" fill="currentColor" />
              <path
                d="M9 13h4.5a3.5 3.5 0 0 0 0-7H15"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
              />
              <circle
                cx="17.5"
                cy="6"
                r="2.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
              />
              <path
                d="M17.5 8.5V19"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
              />
            </svg>
          </span>
          <span class="tab-btn-label">Route</span>
        </button>

        <button
          type="button"
          class="tab-btn"
          role="tab"
          id="tab-btn-todo"
          aria-controls="tab-todo"
          aria-selected="false"
          tabindex="-1"
          data-tab="todo"
        >
          <span class="tab-btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <rect
                x="4.5"
                y="3.5"
                width="15"
                height="17"
                rx="2.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
              />
              <path
                d="M8 8.5h8M8 12.5h8M8 16.5h5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
              />
              <path
                d="M8 8.5 9.2 9.7 11 7.7"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <span class="tab-btn-label">To Do</span>
        </button>

        <button
          type="button"
          class="tab-btn"
          role="tab"
          id="tab-btn-planning"
          aria-controls="tab-planning"
          aria-selected="false"
          tabindex="-1"
          data-tab="planning"
        >
          <span class="tab-btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <rect
                x="3.5"
                y="5"
                width="17"
                height="15"
                rx="2.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
              />
              <path
                d="M8 3.5V7M16 3.5V7M3.5 10h17"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
              />
            </svg>
          </span>
          <span class="tab-btn-label">Planning</span>
        </button>
      </nav>
    </div>

    <script src="app.js"></script>
  </body>
</html>
